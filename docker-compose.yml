services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      OSTINATO_DB_PATH: /data/ostinato.db
      OSTINATO_SECRETS_PATH: /data/secrets.json
    ports:
      - "5173:5173"
    volumes:
      - ostinato_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - "fetch('http://localhost:5173/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  ostinato_data:
