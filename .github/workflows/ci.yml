name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: node test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      contains(toJSON(github.event.pull_request.labels.*.name), 'container') ||
      github.event.pull_request.head.ref == 'container/distroless' ||
      contains(github.event.pull_request.title, 'container') ||
      contains(github.event.pull_request.title, 'docker')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: cp .env.example .env
      - run: docker compose build

  docker-smoke:
    name: docker smoke (boot + healthcheck)
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      contains(toJSON(github.event.pull_request.labels.*.name), 'container') ||
      github.event.pull_request.head.ref == 'container/distroless' ||
      contains(github.event.pull_request.title, 'container') ||
      contains(github.event.pull_request.title, 'docker')
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose up -d --build
      - name: wait for healthy
        run: |
          for i in $(seq 1 40); do
            cid=$(docker compose ps -q app)
            if [ -z "$cid" ]; then
              echo "container not running"
              docker compose logs app || true
              exit 1
            fi
            status=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "no-health")
            echo "attempt $i: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 3
          done
          echo "timed out waiting for healthy"
          docker compose logs app
          exit 1
      - name: show app logs
        if: always()
        run: docker compose logs app || true
      - name: teardown
        if: always()
        run: docker compose down -v
